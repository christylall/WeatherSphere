<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WeatherSphere 🌦️</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="weatherAnimation"></div>
    <div class="container">
        <header class="header">
            <h1 class="app-title">WeatherSphere 🌦️</h1>
            <button id="themeToggle" class="theme-toggle">🌙 Night Theme</button>
        </header>

        <section class="search-section">
            <input type="text" id="searchInput" class="search-input" placeholder="Enter city name 🔍">
            <button id="searchBtn" class="search-btn">Search</button>
        </section>

        <section class="location-buttons">
            <button class="location-btn" data-location="Delhi">Delhi 🏛️</button>
            <button class="location-btn" data-location="Mumbai">Mumbai 🌊</button>
            <button class="location-btn" data-location="Kolkata">Kolkata 🛕</button>
            <button class="location-btn" data-location="Chennai">Chennai 🏝️</button>
        </section>

        <section id="homeSection">
            <p class="loading-text">Detecting your location... 📍</p>
        </section>

        <section class="ai-chat">
            <div class="ai-container">
                <img src="https://i.ibb.co/xKgRbQxT/image.png" class="ai-image" alt="AI Bot">
                <div class="ai-box">
                    <h3>🤖 Weather AI Assistant</h3>
                    <div class="suggestions">
                        <button onclick="window.fillQuestion('What is the temperature here?')">Temp 🌡️</button>
                        <button onclick="window.fillQuestion('What should I wear?')">Wear 👗</button>
                        <button onclick="window.fillQuestion('Best crop for this weather?')">Crops 🌾</button>
                    </div>
                    <input id="aiInput" class="ai-input" placeholder="Ask AI anything...">
                    <button onclick="window.askAI()" class="ai-btn">Ask AI 💬</button>
                    <p id="aiOutput" class="ai-output"></p>
                </div>
            </div>
        </section>
        <footer><p>WeatherSphere © 2026 🌍 ✨</p></footer>
    </div>
    <script src="script.js"></script>
</body>
</html>
