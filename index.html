<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Weather App</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div id="weatherAnimation"></div>

<div class="container">

  <div class="header">
    <h1 class="app-title">Weather App</h1>
    <button id="themeToggle">Theme</button>
  </div>

  <div class="search-section">
    <input id="searchInput" class="search-input" placeholder="Enter city">
    <button id="searchBtn" class="search-btn">Search</button>
  </div>

  <div id="homeSection"></div>

  <!-- AI -->
  <div class="ai-chat">
    <h3>AI Assistant</h3>

    <div class="suggestions">
      <button onclick="fillQuestion('temperature')">Temperature?</button>
      <button onclick="fillQuestion('wear')">What to wear?</button>
      <button onclick="fillQuestion('weather')">Weather?</button>
      <button onclick="fillQuestion('advice')">Advice?</button>
    </div>

    <input id="aiInput" placeholder="Ask something...">
    <button onclick="askAI()">Ask</button>

    <div id="aiOutput"></div>
  </div>

</div>

<script src="script.js"></script>
</body>
</html>
