<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WeatherSphere 🌦️</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div id="weatherAnimation"></div>

<div class="container">

<header class="header">
    <h1 class="app-title">WeatherSphere 🌦️</h1>
    <button id="themeToggle" class="theme-toggle">🌙 Theme</button>
</header>

<!-- SEARCH -->
<section class="search-section">
    <input type="text" id="searchInput" placeholder="Enter your city 🌍">
    <button id="searchBtn">Search</button>
</section>

<!-- QUICK CITIES -->
<section class="location-buttons">
    <button class="location-btn" data-location="Delhi">Delhi</button>
    <button class="location-btn" data-location="Mumbai">Mumbai</button>
    <button class="location-btn" data-location="Kolkata">Kolkata</button>
    <button class="location-btn" data-location="Chennai">Chennai</button>
</section>

<!-- WEATHER OUTPUT -->
<section id="homeSection">
    <p>Search a city to see weather 🌍</p>
</section>

<!-- SWIPE DOTS (IMPORTANT FIX) -->
<div class="dots">
    <span class="dot active" onclick="goSlide(0)"></span>
    <span class="dot" onclick="goSlide(1)"></span>
    <span class="dot" onclick="goSlide(2)"></span>
</div>

<!-- AI SECTION -->
<section class="ai-chat">

    <h3>🤖 Weather AI</h3>

    <!-- AI IMAGE -->
    <img 
        src="https://cdn-icons-png.flaticon.com/512/4712/4712027.png"
        class="ai-img"
    >

    <!-- AI QUICK QUESTIONS -->
    <div class="ai-questions">
        <button onclick="fillQuestion('temp')">🌡️ Temperature</button>
        <button onclick="fillQuestion('wear')">👕 What to wear</button>
        <button onclick="fillQuestion('crop')">🌾 Crop</button>
        <button onclick="fillQuestion('disease')">🦟 Disease</button>
    </div>

    <!-- INPUT -->
    <input id="aiInput" placeholder="Ask something...">
    <button onclick="askAI()">Ask</button>

    <!-- OUTPUT -->
    <div id="aiOutput"></div>

</section>

</div>

<script src="script.js"></script>

</body>
</html>
