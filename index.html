<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Weather App</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div id="weatherAnimation"></div>

<div class="container">

<header class="header">
    <h1>Weather App</h1>
    <button id="themeToggle">Theme</button>
</header>

<div class="search">
    <input id="searchInput" placeholder="Enter city">
    <button id="searchBtn">Search</button>
</div>

<div class="locations">
    <button class="location-btn" data-location="Delhi">Delhi</button>
    <button class="location-btn" data-location="Mumbai">Mumbai</button>
    <button class="location-btn" data-location="Kolkata">Kolkata</button>
    <button class="location-btn" data-location="Chennai">Chennai</button>
</div>

<!-- OUTPUT -->
<section id="homeSection"></section>

<!-- AI -->
<div class="ai-box">
    <h3>AI Assistant</h3>

    <div class="suggestions">
        <button onclick="fillQuestion('temperature')">Temperature</button>
        <button onclick="fillQuestion('what should i wear')">Wear</button>
        <button onclick="fillQuestion('weather')">Weather</button>
    </div>

    <input id="aiInput" placeholder="Ask something...">
    <button onclick="askAI()">Ask</button>

    <p id="aiOutput"></p>
</div>

</div>

<script src="script.js"></script>
</body>
</html>j
