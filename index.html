<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WeatherSphere 🌦️</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

 <!-- BACKGROUND ANIMATION -->
<div id="weatherAnimation"></div>

<div class="container">

    <!-- HEADER -->
    <header class="header">
        <h1 class="app-title">WeatherSphere 🌦️</h1>
        <button id="themeToggle" class="theme-toggle">🌙 Night Theme</button>
    </header>

    <!-- SEARCH -->
    <section class="search-section">
        <input type="text" id="searchInput" class="search-input" placeholder="Enter your city 🌍">
        <button id="searchBtn" class="search-btn">Search</button>
    </section>

    <!-- QUICK CITIES -->
    <section class="location-buttons">
        <button class="location-btn" data-location="Delhi">Delhi</button>
        <button class="location-btn" data-location="Mumbai">Mumbai</button>
        <button class="location-btn" data-location="Kolkata">Kolkata</button>
        <button class="location-btn" data-location="Chennai">Chennai</button>
    </section>

    <!-- WEATHER DISPLAY -->
    <section id="homeSection">
        <p>Search a city to see weather 🌍</p>
    </section>

    <!-- AI SECTION -->
    <section class="ai-chat">
        <h3>🤖 Weather AI Assistant</h3>

        <input id="aiInput" placeholder="Ask: temperature, weather, AQI 🌤️">

        <button onclick="askAI()">Ask AI</button>

        <div id="aiOutput"></div>
    </section>

</div>

<script src="script.js"></script>

</body>
</html>
