<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>WeatherSphere</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="container">

<header class="header">

<h1 class="app-title">🌍 WeatherSphere</h1>

<button id="themeToggle" class="theme-toggle">
🌙 Night Theme
</button>

</header>


<!-- SEARCH -->

<section class="search-section">

<input 
type="text" 
id="searchInput" 
class="search-input" 
placeholder="Enter city name"
>

<button id="searchBtn" class="search-btn">
Search
</button>

</section>


<!-- QUICK LOCATION BUTTONS -->

<section class="location-buttons">

<button class="location-btn" data-location="Delhi">
Delhi
</button>

<button class="location-btn" data-location="Mumbai">
Mumbai
</button>

<button class="location-btn" data-location="Kolkata">
Kolkata
</button>

<button class="location-btn" data-location="Chennai">
Chennai
</button>

</section>


<!-- WEATHER OUTPUT -->

<section id="homeSection">

<p class="loading-text">
Search a city or allow location access to see weather
</p>

</section>


<!-- AI CHAT -->

<section class="ai-chat">

<h3>🤖 WeatherSphere AI</h3>

<div class="suggestions">

<p>Try asking:</p>

<button onclick="fillQuestion('What is the temperature here?')">
Temperature Here
</button>

<button onclick="fillQuestion('What should I wear in this weather?')">
Dress Suggestion
</button>

<button onclick="fillQuestion('Which crop grows best in this weather?')">
Best Crop
</button>

<button onclick="fillQuestion('What disease can occur in this weather?')">
Disease Risk
</button>

</div>


<input 
id="aiInput" 
placeholder="Ask weather related question..."
>


<button onclick="askAI()">
Ask AI
</button>


<p id="aiOutput"></p>

</section>


<footer>

<p>
WeatherSphere © 2025 | Developed by Christy Lall
</p>

</footer>


</div>


<script src="script.js"></script>


<!-- ENTER KEY SEARCH -->

<script>

document.getElementById("searchInput")
.addEventListener("keypress",function(e){

if(e.key==="Enter"){

document.getElementById("searchBtn").click()

}

})

</script>

</body>

</html>
