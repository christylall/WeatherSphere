<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WeatherSphere</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div id="weatherAnimation"></div>

<div class="container">

<header class="header">
<h1 class="app-title">🌦️ WeatherSphere</h1>
<button id="themeToggle">🌙</button>
</header>

<section class="search-section">
<input id="searchInput" placeholder="Enter city">
<button id="searchBtn">Search</button>
</section>

<section class="location-buttons">
<button class="location-btn" data-location="Delhi">Delhi</button>
<button class="location-btn" data-location="Mumbai">Mumbai</button>
<button class="location-btn" data-location="Kolkata">Kolkata</button>
<button class="location-btn" data-location="Chennai">Chennai</button>
</section>

<section id="homeSection">
<p>Detecting location...</p>
</section>

<section class="ai-box">
<h3>Weather AI</h3>
<input id="aiInput">
<button onclick="askAI()">Ask</button>
<p id="aiOutput"></p>
</section>

</div>

<script src="script.js"></script>
</body>
</html>
