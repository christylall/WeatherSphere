 <!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🌍 WeatherSphere ✨</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div id="weatherAnimation"></div>

<div class="container">

<header class="header">
    <h1 class="app-title">🌍 WeatherSphere ✨</h1>
    <button id="themeToggle" class="theme-toggle">🌙 Night</button>
</header>

<section class="search-section">
    <input id="searchInput" class="search-input" placeholder="Enter city 🔍">
    <button id="searchBtn" class="search-btn">Search</button>
</section>

<section class="location-buttons">
    <button class="location-btn" data-location="Delhi">Delhi 🏛️</button>
    <button class="location-btn" data-location="Mumbai">Mumbai 🌊</button>
    <button class="location-btn" data-location="Kolkata">Kolkata 🛕</button>
    <button class="location-btn" data-location="Chennai">Chennai 🏝️</button>
</section>

<section id="homeSection"></section>

<!-- 🤖 AI -->
<section class="ai-chat">
    <h3>🤖 Weather AI Assistant</h3>

    <div class="suggestions">
        <button onclick="fillQuestion('temperature')">🌡️ Temp</button>
        <button onclick="fillQuestion('wear')">👗 Wear</button>
        <button onclick="fillQuestion('crop')">🌾 Crop</button>
        <button onclick="fillQuestion('disease')">🦟 Disease</button>
    </div>

    <input id="aiInput" class="ai-input" placeholder="Ask something...">
    <button class="ai-btn" onclick="askAI()">Ask AI 💬</button>

    <div id="aiOutput" class="ai-output"></div>
</section>

<footer>WeatherSphere © 2026 🌍</footer>

</div>

<script src="script.js"></script>
</body>
</html>
